[pytest]
# Pytest configuration for chat_to project

# Test discovery
python_files = test_*.py
python_classes = Test*
python_functions = test_*
testpaths = tests

# Markers
markers =
    unit: Unit tests (isolated, fast)
    integration: Integration tests (multiple components)
    e2e: End-to-end tests (full user journeys)
    slow: Tests that take more than 5 seconds
    requires_ollama: Tests requiring Ollama LLM to be running
    asyncio: Async tests (automatically handled by pytest-asyncio)

# Output options
addopts =
    -v
    --tb=short
    --strict-markers
    --disable-warnings
    -ra

# Async support
asyncio_mode = auto

# Coverage options (when using --cov)
[coverage:run]
source = backend
omit =
    */venv/*
    */tests/*
    */__pycache__/*
    */site-packages/*

[coverage:report]
precision = 2
show_missing = True
skip_covered = False

[coverage:html]
directory = htmlcov
